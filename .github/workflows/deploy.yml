name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      ENABLE_SCRAPER: "false"
      OWLGORITHM_PUBLIC_URL: http://127.0.0.1:3847

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run verify
      - run: npm start > /tmp/owlgorithm.log 2>&1 &
      - run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3847/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/owlgorithm.log
          exit 1
      - run: npm run smoke:auth
