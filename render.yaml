      - key: OWLGORITHM_SUPPORT_API_BASE_URL
        value: https://api.x.ai/v1
      - key: OWLGORITHM_SUPPORT_MODEL
        value: grok-4.3
      - key: UPLOAD_POST_API_KEY
        sync: false
      - key: UPLOAD_POST_API_BASE_URL
        value: https://api.upload-post.com/api
      - key: UPLOAD_POST_PROFILE_USERNAME
        sync: false
      - key: UPLOAD_POST_PROFILE_MODE
