services:
  - type: web
    runtime: node
    name: owlgorithm
    plan: starter
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: checksPass
    disk:
      name: owlgorithm-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: OWLGORITHM_BASE_PATH
        value: /
      - key: OWLGORITHM_HOST
        value: 0.0.0.0
      - key: OWLGORITHM_PUBLIC_URL
        sync: false
      - key: OWLGORITHM_DATA_DIR
        value: /var/data/owlgorithm
      - key: ENABLE_SCRAPER
        value: "true"
      - key: FIREBASE_PROJECT_ID
        value: owlgorithm-fdc26
      - key: VITE_FIREBASE_API_KEY
        value: AIzaSyAbu0mnx7hBMi45XBt4tQBlk6IuL1waFqo
      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: owlgorithm-fdc26.firebaseapp.com
      - key: VITE_FIREBASE_PROJECT_ID
        value: owlgorithm-fdc26
      - key: VITE_FIREBASE_STORAGE_BUCKET
        value: owlgorithm-fdc26.firebasestorage.app
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        value: "1015807657200"
      - key: VITE_FIREBASE_APP_ID
        value: 1:1015807657200:web:aa5036de883acdc3eeae35
      - key: VITE_FIREBASE_MEASUREMENT_ID
        value: G-NDDK160T31
      - key: OWLGORITHM_EMAIL_FROM
        sync: false
      - key: OWLGORITHM_SMTP_HOST
        sync: false
      - key: OWLGORITHM_SMTP_PORT
        value: "587"
      - key: OWLGORITHM_SMTP_USER
        sync: false
      - key: OWLGORITHM_SMTP_PASSWORD
        sync: false
      - key: OWLGORITHM_SMTP_SECURE
        value: "false"
      - key: OWLGORITHM_ADMIN_TOKEN
        generateValue: true
      - key: OWLGORITHM_MEDIA_API_KEY
        sync: false
      - key: OWLGORITHM_MEDIA_API_BASE_URL
        sync: false
      - key: OWLGORITHM_MEDIA_IMAGE_MODEL
        sync: false
      - key: OWLGORITHM_MEDIA_VIDEO_MODEL
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: XAI_API_BASE_URL
