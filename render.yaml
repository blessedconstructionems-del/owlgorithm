services:
  - type: web
    runtime: node
    name: owlgorithm
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: checksPass
    disk:
      name: owlgorithm-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: OWLGORITHM_BASE_PATH
        value: /
      - key: OWLGORITHM_PUBLIC_URL
        sync: false
      - key: OWLGORITHM_DATA_DIR
        value: /var/data/owlgorithm
      - key: ENABLE_SCRAPER
        value: "true"
      - key: OWLGORITHM_EMAIL_FROM
        sync: false
      - key: OWLGORITHM_SMTP_HOST
        sync: false
      - key: OWLGORITHM_SMTP_PORT
        value: "587"
      - key: OWLGORITHM_SMTP_USER
        sync: false
      - key: OWLGORITHM_SMTP_PASSWORD
        sync: false
      - key: OWLGORITHM_SMTP_SECURE
        value: "false"
      - key: OWLGORITHM_ADMIN_TOKEN
        generateValue: true
      - key: OWLGORITHM_MEDIA_API_KEY
        sync: false
      - key: OWLGORITHM_MEDIA_API_BASE_URL
        sync: false
      - key: OWLGORITHM_MEDIA_IMAGE_MODEL
        sync: false
      - key: OWLGORITHM_MEDIA_VIDEO_MODEL
        sync: false
      - key: OWLGORITHM_SOCIAL_API_KEY
        sync: false
      - key: OWLGORITHM_SOCIAL_PROFILE
        sync: false
      - key: OWLGORITHM_SOCIAL_API_BASE_URL
        sync: false
      - key: OWLGORITHM_SOCIAL_AUTH_SCHEME
        value: Apikey
      - key: OWLGORITHM_SOCIAL_TIMEZONE
        value: America/New_York
      - key: OWLGORITHM_SOCIAL_FACEBOOK_PAGE_ID
        sync: false
      - key: OWLGORITHM_SOCIAL_LINKEDIN_PAGE_ID
        sync: false
      - key: OWLGORITHM_SOCIAL_PINTEREST_BOARD_ID
        sync: false
      - key: OWLGORITHM_SOCIAL_REDDIT_SUBREDDIT
        sync: false
      - key: OWLGORITHM_SOCIAL_GOOGLE_BUSINESS_LOCATION_ID
        sync: false
      - key: OWLGORITHM_SOCIAL_UPLOAD_ENDPOINT
        sync: false
      - key: OWLGORITHM_SOCIAL_PHOTO_ENDPOINT
        sync: false
      - key: OWLGORITHM_SOCIAL_TEXT_ENDPOINT
        sync: false
      - key: OWLGORITHM_SOCIAL_STATUS_ENDPOINT
        sync: false
